<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,900;1,700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;box-sizing:border-box;}
.card{width:800px;height:500px;background:#22432f;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:'Nunito',sans-serif;position:relative;overflow:hidden;}
.badge{width:140px;height:140px;border-radius:50%;border:6px solid #e8b93f;display:flex;align-items:center;justify-content:center;font-size:76px;background:rgba(255,255,255,.05);margin-bottom:20px;}
h1{font-family:'Bitter',serif;color:#fff;font-size:58px;line-height:1;}
.sub{font-family:'Bitter',serif;font-style:italic;color:#e8b93f;font-size:24px;margin-top:10px;}
.pill{margin-top:20px;background:#e8b93f;color:#22432f;font-weight:900;padding:8px 22px;border-radius:100px;font-size:15px;letter-spacing:1px;text-transform:uppercase;}
.dots{position:absolute;bottom:18px;font-size:26px;letter-spacing:10px;}
</style></head><body>
<div class="card">
  <div class="badge">🎒</div>
  <h1>Emergency-Ready Kit</h1>
  <div class="sub">Lista para Todo · Home · Car · Camping</div>
  <div class="pill">Printable · For beginners</div>
  <div class="dots">🏠 🚗 ⛺ 🩹</div>
</div><script></script></body></html>
