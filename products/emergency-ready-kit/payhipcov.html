<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,800;0,900;1,700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
.cover{width:1080px;height:1350px;background:radial-gradient(circle at 50% 24%,#2f6b45,#22432f 62%);color:#faf7f0;display:flex;flex-direction:column;align-items:center;text-align:center;padding:70px 64px;font-family:'Nunito',sans-serif;position:relative;}
.top{font-weight:800;letter-spacing:5px;text-transform:uppercase;font-size:20px;color:#d8c9a3;}
.badge{width:270px;height:270px;border-radius:50%;border:10px solid #e8b93f;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:140px;margin:38px 0 30px;box-shadow:0 0 0 14px rgba(232,185,63,.14);}
h1{font-family:'Bitter',serif;font-weight:900;color:#fff;font-size:96px;line-height:.98;letter-spacing:-1px;}
.sub{font-family:'Bitter',serif;font-style:italic;color:#e8b93f;font-size:38px;margin-top:16px;padding:0 10px;}
.desc{font-weight:700;font-size:28px;color:#e7efe3;margin-top:24px;max-width:820px;line-height:1.4;}
.pills{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:40px;}
.pill{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.25);border-radius:100px;padding:14px 26px;font-weight:800;font-size:24px;color:#fff;}
.mb{display:flex;gap:20px;justify-content:center;margin-top:44px;}
.mb div{width:110px;height:110px;border-radius:50%;background:#e8b93f;border:5px solid #22432f;display:flex;align-items:center;justify-content:center;font-size:56px;}
.agebar{margin-top:auto;display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
.agebar .a{background:#b5562f;color:#fff;font-weight:900;font-size:26px;padding:14px 30px;border-radius:100px;letter-spacing:1px;text-transform:uppercase;}
.agebar .l{background:#e8b93f;color:#22432f;font-weight:900;font-size:26px;padding:14px 30px;border-radius:100px;letter-spacing:1px;text-transform:uppercase;}
.site{margin-top:32px;font-weight:800;letter-spacing:5px;text-transform:uppercase;font-size:23px;color:#d8c9a3;}
</style></head><body>
<div class="cover" id="cover">
  <div class="top" id="top">A family emergency kit</div>
  <div class="badge">🎒</div>
  <h1 id="title">Emergency-<br>Ready</h1>
  <div class="sub" id="sub">Peace of mind, not fear</div>
  <div class="desc" id="desc">Know exactly what to pack to be ready at home, in the car, and camping, without the overwhelm.</div>
  <div class="mb"><div>🏠</div><div>🚗</div><div>⛺</div><div>🩹</div></div>
  <div class="agebar"><div class="a" id="age">For beginners</div><div class="l" id="lang">English + Español</div></div>
  <div class="site">paolaadventurer.com</div>
</div>
<script></script>
</body></html>
