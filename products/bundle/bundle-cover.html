<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bundle Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,800;0,900&family=Nunito:wght@700;800&display=swap');
  :root{--forest:#2f6b45;--forest-deep:#22432f;--terra:#b5562f;--khaki:#d8c9a3;--sun:#e8b93f;--cream:#fffdf5;}
  *{margin:0;box-sizing:border-box;}
  .card{width:1200px;height:1200px;background:var(--forest-deep);position:relative;overflow:hidden;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;}
  .ribbon{width:100%;height:26px;background:repeating-linear-gradient(90deg,var(--terra) 0 70px,var(--sun) 70px 140px,var(--khaki) 140px 210px,var(--forest) 210px 280px);}
  .top{text-align:center;padding:56px 60px 0;}
  .badge{display:inline-block;background:var(--sun);color:var(--forest-deep);font-family:'Bitter',serif;font-weight:900;font-size:26px;letter-spacing:2px;text-transform:uppercase;padding:12px 34px;border-radius:100px;}
  h1{font-family:'Bitter',serif;font-weight:900;color:#fff;font-size:74px;line-height:1;margin:22px 0 8px;}
  .sub{font-family:'Nunito';font-weight:800;color:var(--khaki);font-size:30px;}
  .stage{position:relative;flex:1;width:100%;}
  .stage img{position:absolute;width:440px;border:9px solid #fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.5);top:70px;}
  .left{left:110px;transform:rotate(-8deg);z-index:1;}
  .right{right:110px;transform:rotate(8deg);z-index:2;}
  .plus{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);z-index:3;background:var(--terra);color:#fff;width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bitter',serif;font-weight:900;font-size:70px;box-shadow:0 10px 0 #8f411f;}
  .bottom{width:100%;background:var(--cream);padding:34px 60px 40px;text-align:center;}
  .price{font-family:'Bitter',serif;font-weight:900;color:var(--terra);font-size:60px;}
  .price .was{color:#b9b0a0;text-decoration:line-through;font-size:34px;margin-left:12px;}
  .langs{font-family:'Nunito';font-weight:800;color:var(--forest);font-size:26px;margin-top:6px;}
  .site{font-family:'Bitter',serif;font-weight:800;color:var(--forest);font-size:24px;margin-top:12px;background:var(--sun);display:inline-block;padding:10px 30px;border-radius:100px;}
</style>
</head>
<body>
<div class="card">
  <div class="ribbon"></div>
  <div class="top">
    <span class="badge">2-in-1 Bundle</span>
    <h1>Camping With<br>Kids Bundle</h1>
    <div class="sub">Family Camping Planner + Kids' Adventure Pack</div>
  </div>
  <div class="stage">
    <img class="left" src="planner-cover.png" alt="">
    <img class="right" src="kids-cover.png" alt="">
    <div class="plus">+</div>
  </div>
  <div class="bottom">
    <div class="price">$9 <span class="was">$12</span></div>
    <div class="langs">English + Español &middot; Print at home</div>
    <div class="site">paolaadventurer.com</div>
  </div>
</div>
</body>
</html>
